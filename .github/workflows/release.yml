name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Tag, build, publish to PyPI, create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read version from pyproject.toml
        id: version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $v (tag v$v)"

      - name: Skip if tag already exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build tooling
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist + wheel
        if: steps.tag_check.outputs.skip == 'false'
        run: python -m build

      - name: Verify dist with twine
        if: steps.tag_check.outputs.skip == 'false'
        run: twine check dist/*

      - name: Extract release notes from CHANGELOG
        if: steps.tag_check.outputs.skip == 'false'
        id: notes
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v v="## $version" '
            $0 == v {found=1; next}
            found && /^## / {exit}
            found {print}
          ' CHANGELOG.md > release_notes.md
          if [ ! -s release_notes.md ]; then
            echo "## $version" > release_notes.md
            echo "" >> release_notes.md
            echo "Release notes not found in CHANGELOG.md — see commit history." >> release_notes.md
          fi
          echo "Release notes ($(wc -l < release_notes.md) lines):"
          cat release_notes.md

      - name: Publish to PyPI
        if: steps.tag_check.outputs.skip == 'false'
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

      - name: Create git tag
        if: steps.tag_check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        if: steps.tag_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release_notes.md
          files: dist/*
