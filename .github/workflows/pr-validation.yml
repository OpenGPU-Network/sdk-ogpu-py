name: PR Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate-release-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check branch name format
        run: |
          branch="${{ github.head_ref }}"
          echo "Source branch: $branch"
          if ! [[ "$branch" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Source branch '$branch' does not match v<MAJOR>.<MINOR>.<PATCH>."
            echo "::error::Only release branches (e.g. v0.2.1, v0.3.0) can be merged into main."
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Check version drift between branch name and pyproject.toml
        run: |
          branch="${{ github.head_ref }}"
          branch_version="${branch#v}"
          pyproject_version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "Branch version    : $branch_version"
          echo "pyproject version : $pyproject_version"
          if [ "$branch_version" != "$pyproject_version" ]; then
            echo "::error::Branch name says '$branch_version' but pyproject.toml says '$pyproject_version'. Bump pyproject.toml or rename the branch."
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install -r docs-requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/unit -q

      - name: Type check
        run: python -m mypy ogpu --strict

      - name: Build docs (strict)
        run: python -m mkdocs build --strict
